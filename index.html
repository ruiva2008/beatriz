<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beatriz</title>
    
    <style>
        /* Configurações gerais da página */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }

        /* Topo da página */
        header {
            background-color: DarkSlateBlue;
            color: FloralWhite;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 16px;
            border-radius: 8px 8px 0 0; /* Arredonda as pontas de cima */
        }

        header h1 {
            margin: 0 0 10px 0;
        }

        header p {
            margin: 0;
            opacity: 0.9;
        }

        /* Conteúdo principal */
        main {
            background-color: #ffffff;
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 16px;
            box-sizing: border-box;
            border-radius: 0 0 8px 8px; /* Arredonda as pontas de baixo */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); /* Sombra leve para dar elegância */
            
            /* Alinha os itens em coluna e centralizados */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Estilização da imagem */
        img {
            width: 120px; /* Um pouco maior para dar destaque */
            height: 120px;
            object-fit: cover; /* Garante que a imagem não fique distorcida */
            border-radius: 50%; /* Deixa a imagem redonda, estilo avatar */
            margin-bottom: 16px;
        }

        main h2 {
            margin: 0 0 8px 0;
            color: DarkSlateBlue;
        }

        .autor {
            font-style: italic;
            color: #666;
            margin: 0 0 16px 0;
        }

        .mensagem {
            font-size: 1.1rem;
            max-width: 500px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>Crie um nome para sua página</h1>
        <p>Faça uma introdução interessante, diga algo que chame a atenção</p>
    </header>

    <main>
        <p><img src="entregue.png" alt="Pessoa atribulada com trabalhos para entregar"></p>
        <h2>Meu primeiro post</h2>
        <p class="autor">Por: Marcos Felix</p>
        <p class="mensagem">Crie uma mensagem legal de Boas Vindas</p>
    </main>

</body>
</html>
